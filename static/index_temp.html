<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transnet - Translation Network</title>
  <!-- Load Tailwind CSS (get style css file from CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /**
     * Set a default font for better aesthetics 
     * @TODO: Complete this block with more details and components.
     */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f7f9fb;
      color: #1f2937;
    }
  </style>
</head>

<body class="p-4 md:p-8 min-h-screen">

  <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-xl p-6 md:p-10 border border-gray-100">

    <h1 class="text-3xl md:text-4xl font-extrabold text-blue-600 mb-6 border-b pb-2">
      Transnet
    </h1>
    <p class="text-gray-600 mb-8">
      Hello there! This is a simple web for Transnet
    </p>

    <!-- Input Text -->
    <div class="mb-6">
      <label for="input-text" class="block text-lg font-medium text-gray-700 mb-2">
        Input (Chinese Text to Translate)
      </label>
      <textarea id="input-text" rows="6" placeholder="Type your Chinese text here..."
        class="w-full p-4 border border-gray-300 rounded-lg 
                focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out shadow-sm resize-none"></textarea>
    </div>

    <!-- Translate Button -->
    <div class="flex justify-center mb-8">
      <button id="translate-button" onclick="transInput()"
        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition duration-200 ease-in-out hover:scale-105 active:scale-95 disabled:bg-gray-400 flex items-center">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
        Translate
      </button>
    </div>

    <!-- Output Text -->
    <div class="mb-6">
      <label for="output-text" class="block text-lg font-medium text-gray-700 mb-2">
        Output
      </label>
      <div id="output-loading-indicator" class="hidden text-center py-4 text-blue-600 font-semibold">
        Translating... Please wait.
      </div>
      <textarea id="output-text" rows="8" readonly placeholder="The Translated result..."
        class="w-full p-4 border border-gray-300 bg-gray-50 rounded-lg shadow-inner resize-none"></textarea>
    </div>

  </div>

  <script src="js/main_temp.js"></script>
</body>

</html>
